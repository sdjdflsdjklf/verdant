name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: 'main.js,manifest.json,styles.css'
          generateReleaseNotes: true
          body: |
            ## Installation

            1. Download `main.js`, `manifest.json`, and `styles.css` from the assets below.
            2. Create a folder `obsidian-garden` in your Obsidian plugins directory (`.obsidian/plugins/`).
            3. Place the three files in that folder.
            4. Enable the plugin in Obsidian Settings → Community Plugins.

            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            > **Note**: `.mjs` scripts in the repository root (`scripts/*.mjs`) are development utilities and **not** part of the plugin release. Only `main.js`, `manifest.json`, and `styles.css` are required.
          token: ${{ secrets.GITHUB_TOKEN }}
